name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install ruff
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Run Pytest
      run: |
        pytest -v
        
    - name: Validate Estimator
      run: |
        whest validate --estimator estimator.py
      continue-on-error: true # Continues if Whest validator has specific environment requirements on Ubuntu
